<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <title>Login</title>
    <link rel="icon" href="data:,">
    <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f6f8;
        margin:0;
        padding:40px;
    }

    input{
        width:100%;
        padding:8px;
        border:1px solid #bbb;
        border-radius:5px;
    }

    button{
        background:#FF9933;
        color:white;
        border:none;
        padding:8px 14px;
        border-radius:6px;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }
    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #333;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 9999;
        opacity: 0.95;
        animation: fadeInOut 3s forwards;
    }

    .toast.success { background: #28a745; }
    .toast.error { background: #dc3545; }
    .toast.warning { background: #ffc107; color:black; }
    .toast.info { background: #17a2b8; }

    @keyframes fadeInOut {
        0% { opacity: 0; transform: translateY(20px); }
        10% { opacity: 1; transform: translateY(0); }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(20px); }
    }
    </style>


</head>
<body>

<div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">

<img src="/static/icons/ashoka.png" width="70">

<div>
<h2 style="margin:0;">Inspection Commission of India</h2>
<p style="margin:0;color:gray;">Government of India</p>
</div>

<img src="/static/icons/india-map.png" width="70" style="margin-left:auto;">

</div>

<hr>

<div style="background:white;padding:25px;width:350px;margin:80px auto;border-radius:8px;border:1px solid #ddd;">

<h2>Login</h2>

<input id="loginUsername" placeholder="Username"><br><br>

<input id="loginPassword" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<p>Don't have an account?</p>

<button onclick="goToRegister()">Register</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
