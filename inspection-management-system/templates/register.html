<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
    .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 18px;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        z-index: 9999;
        opacity: 0.95;
    }

    .toast.success { background: green; }
    .toast.error { background: red; }
    .toast.warning { background: orange; }
    .toast.info { background: blue; }
    </style>
    <style>
    .toast {
        animation: fadeInOut 3s ease forwards;
    }
    @keyframes fadeInOut {
        0% { opacity: 0; transform: translateY(-10px); }
        10% { opacity: 1; transform: translateY(0); }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-10px); }
    }
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f6f8;
        margin:0;
        padding:40px;
    }

    input, select{
        width:100%;
        padding:8px;
        border:1px solid #bbb;
        border-radius:5px;
    }

    button{
        background:#FF9933;
        color:white;
        border:none;
        padding:8px 14px;
        border-radius:6px;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }
    </style>
    </head>
<body>

<div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">

<img src="/static/icons/ashoka.png" width="70">

<div>
<h2 style="margin:0;">Inspection Commission of India</h2>
<p style="margin:0;color:gray;">Government of India</p>
</div>

<img src="/static/icons/india-map.png" width="70" style="margin-left:auto;">

</div>

<hr>

<div style="background:white;padding:25px;width:400px;margin:80px auto;border-radius:8px;border:1px solid #ddd;">

<h2>Register</h2>

<input id="regUsername" placeholder="Username"><br><br>
<input id="regPassword" type="password" placeholder="Password"><br><br>
<input id="regConfirmPassword" type="password" placeholder="Confirm Password"><br><br>

<input id="regDepartment" placeholder="Department"><br><br>
<input id="regDesignation" placeholder="Designation"><br><br>
<input id="regOfficeDivision" placeholder="Office Division"><br><br>
<input id="regContactNumber" placeholder="Contact Number"><br><br>
<input id="regDeviceID" placeholder="Device ID"><br><br>

<select id="regRole">
<option value="inspector">Inspector</option>
<option value="admin">Admin</option>
</select>

<br><br>

<button onclick="register()">Register</button>

<br><br>

<p>Already have an account?</p>
<button onclick="goToLogin()">Login</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
