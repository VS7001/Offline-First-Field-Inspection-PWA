<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
    .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 18px;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        z-index: 9999;
        opacity: 0.95;
    }

    .toast.success { background: green; }
    .toast.error { background: red; }
    .toast.warning { background: orange; }
    .toast.info { background: blue; }
    </style>
    <style>
    .toast {
        animation: fadeInOut 3s ease forwards;
    }
    @keyframes fadeInOut {
        0% { opacity: 0; transform: translateY(-10px); }
        10% { opacity: 1; transform: translateY(0); }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-10px); }
    }
    </style>
    </head>
<body>

<h2>Register</h2>

<input id="regUsername" placeholder="Username"><br><br>
<input id="regPassword" type="password" placeholder="Password"><br><br>
<input id="regConfirmPassword" type="password" placeholder="Confirm Password"><br><br>
<input id="regDepartment" placeholder="Department"><br><br>
<input id="regDesignation" placeholder="Designation"><br><br>
<input id="regOfficeDivision" placeholder="Office Division"><br><br>
<input id="regContactNumber" placeholder="Contact Number"><br><br>
<input id="regDeviceID" placeholder="Device ID"><br><br>

<select id="regRole">
    <option value="inspector">Inspector</option>
    <option value="admin">Admin</option>
</select><br><br>

<button onclick="register()">Register</button>

<br><br>
<p>Already have an account?</p>
<button onclick="goToLogin()">Login</button>

<script src="/static/script.js"></script>
</body>
</html>
